  const r = RANKS.indexOf(from), i = RANKS.indexOf(to);
  if (r < 0 || i < 0 || i <= r) return null;
  let a = 0;

  return { display: `${disp}${sym}`, value: a };

/* ---------- Webhooks Discord ---------- */
async function postJSON(url, body) {
  try { await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) }); } catch {}
}
async function postFile(url, payload, file) {
  try {
    const fd = new FormData();
    fd.append("file", file, file.name);
    fd.append("payload_json", JSON.stringify(payload));
    await fetch(url, { method:"POST", body:fd });
  } catch {}
}

const CartCtx = createContext(null);
const useCart = () => useContext(CartCtx);
function CartProvider({ children }) {
  const [items, setItems] = useState([]);
  const add = (p) => setItems(prev => {
    const ex = prev.find(x => x.id === p.id);
    if (ex) return prev.map(x => x.id === p.id ? { ...x, qty: x.qty + 1 } : x);
    return [...prev, { ...p, qty: 1 }];
  });
  const remove = (id) => setItems(prev => prev.filter(x => x.id !== id));
  const clear = () => setItems([]);
  const total = items.reduce((s, x) => s + x.price * x.qty, 0);
  const count = items.reduce((s, x) => s + x.qty, 0);
  return React.createElement(CartCtx.Provider, { value:{ items, add, remove, clear, total, count } }, children);
}

/* ---------- Hooks visuels ---------- */
function useReveal(deps) {
  useEffect(() => {
    const els = Array.from(document.querySelectorAll("[data-reveal]:not(.is-revealed)"));
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("is-revealed"); io.unobserve(e.target); } });
    }, { threshold: 0.15 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, deps);
}
function useSpotlight() {
  useEffect(() => {
    const handler = (e) => {
      const el = e.target.closest && e.target.closest("[data-spotlight]");
      if (!el) return;
      const r = el.getBoundingClientRect();
      el.style.setProperty("--mx", `${(e.clientX - r.left) / r.width * 100}%`);
      el.style.setProperty("--my", `${(e.clientY - r.top) / r.height * 100}%`);
    };
    document.addEventListener("pointermove", handler);
    return () => document.removeEventListener("pointermove", handler);
  }, []);
}

/* ---------- Petits composants ---------- */
function AnimatedPrice({ value, suffix, currency }) {
  const [v, setV] = useState(value);
  const prev = useRef(value);
  useEffect(() => {
    const from = prev.current, to = value, start = performance.now();
    if (from === to) return;
    let raf;
    const step = (now) => {
      const t = Math.min((now - start) / 500, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      setV(from + (to - from) * eased);
      if (t < 1) raf = requestAnimationFrame(step); else prev.current = to;
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  const disp = Number.isInteger(value) && Math.abs(v - Math.round(v)) < 0.5
    ? String(Math.round(v))
    : v.toFixed(2).replace(".", currency === "EUR" ? "," : ".");
  return React.createElement(Fragment, null, disp, suffix);
}
function CountUp({ end, suffix = "", run }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!run) return;
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) { setN(end); return; }
    const start = performance.now(); let raf;
    const step = (now) => {
      const t = Math.min((now - start) / 1300, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      setN(Math.round(end * eased));
      if (t < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [run, end]);
  return React.createElement(Fragment, null, n, suffix);
}

/* ---------- Barre de progression ---------- */
function ScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const on = () => { const e = document.documentElement; const n = e.scrollHeight - e.clientHeight; setP(n > 0 ? e.scrollTop / n * 100 : 0); };
    on(); window.addEventListener("scroll", on, { passive:true }); window.addEventListener("resize", on);
    return () => { window.removeEventListener("scroll", on); window.removeEventListener("resize", on); };
  }, []);
  return <div className="scroll-progress" aria-hidden="true"><div className="scroll-progress-bar" style={{ width:`${p}%` }} /></div>;
}

/* ---------- Hero ---------- */
const heroParticles = Array.from({ length: 18 }, (_, t) => ({ id:t, left:`${5 + t * 5.2}%`, delay:`${(t * 0.7) % 6}s`, duration:`${4 + (t * 0.4) % 4}s`, rot:`${-15 + (t * 7) % 30}deg` }));
function Hero({ lang }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return; let raf;
    const move = (e) => {
      const r = el.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width * 2 - 1;
      const py = (e.clientY - r.top) / r.height * 2 - 1;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => { el.style.setProperty("--px", px.toFixed(3)); el.style.setProperty("--py", py.toFixed(3)); });
    };
    const leave = () => { el.style.setProperty("--px", 0); el.style.setProperty("--py", 0); };
    el.addEventListener("mousemove", move); el.addEventListener("mouseleave", leave);
    return () => { cancelAnimationFrame(raf); el.removeEventListener("mousemove", move); el.removeEventListener("mouseleave", leave); };
  }, []);
  return (
    <section className="hero" ref={ref}>
      <div className="hero-particles">{heroParticles.map(p => <div key={p.id} className="hero-line" style={{ left:p.left, animationDelay:p.delay, animationDuration:p.duration, "--rot":p.rot }} />)}</div>
      <div className="hero-glow-wrap"><div className="hero-glow" /></div>
      <img className="hero-watermark" src="logo-emblem.png" alt="" aria-hidden="true" />
      <div className="hero-inner">
        <div className="hero-badge reveal" style={{ "--d":"0s" }}><span className="hero-badge-dot" />{T.hero.badge[lang]}</div>
        <h1 className="reveal" style={{ "--d":"0.08s" }}><span className="white">RND.</span><span className="red">SHOP</span></h1>
        <p className="hero-sub reveal" style={{ "--d":"0.16s" }}>{T.hero.sub[lang]}</p>
        <div className="hero-actions reveal" style={{ "--d":"0.24s" }}>
          <a href="#shop" className="hero-cta">{T.hero.cta[lang]}{IconArrow}</a>
          <a href={DISCORD} target="_blank" rel="noopener noreferrer" className="hero-cta-alt">{T.hero.ctaAlt[lang]}</a>
        </div>
        <div className="hero-trust reveal" style={{ "--d":"0.32s" }}>
          {T.hero.trust[lang].map((item, i) => <span key={item} className="hero-trust-item"><span className="hero-trust-icon">{heroTrustIcons[i]}</span>{item}</span>)}
        </div>
      </div>
      <a href="#shop" className="hero-scroll" aria-label={T.hero.scroll[lang]}>
        <span>{T.hero.scroll[lang]}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </a>
    </section>
  );
}

/* ---------- Stats ---------- */
const stats = [
  { icon:IconBolt, fixed:"< 5 min", label:"Livraison express" },
  { icon:IconShield, end:100, suffix:"%", label:"Sécurisé & discret" },
  { icon:IconHeadset, fixed:"24/7", label:"Support Discord" },
  { icon:IconCheckCircle, fixed:"Garanti", label:"Ou remboursé" },
];
function Stats() {
  const ref = useRef(null); const [run, setRun] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) { setRun(true); io.disconnect(); } }), { threshold:0.3 });
    io.observe(el); return () => io.disconnect();
  }, []);
  return (
    <div className="stats" data-reveal ref={ref}>
      {stats.map((s, i) => (
        <div key={s.label} className="stat-item" data-spotlight style={{ "--i":i }}>
          <span className="stat-icon">{s.icon}</span>
          <div>
            <div className="stat-value">{s.fixed ? s.fixed : <CountUp end={s.end} suffix={s.suffix} run={run} />}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- Checkout ---------- */
function Checkout({ currency, onBack, lang }) {
  const { items, total, clear } = useCart();
  const sym = currency === "EUR" ? "€" : "$";
  const [step, setStep] = useState("form");        // form | waiting | proof
  const [method, setMethod] = useState(null);       // paypal | paysafe
  const [discord, setDiscord] = useState("");
  const [email, setEmail] = useState("");
  const [err, setErr] = useState("");
  const [proof, setProof] = useState(null);
  const [proofUrl, setProofUrl] = useState(null);
  const [sending, setSending] = useState(false);
  const fileRef = useRef(null);
  // fige la commande au moment du paiement
  const [snapItems] = useState(() => [...items]);
  const [snapTotal] = useState(() => total);
  const [chosen, setChosen] = useState(null);
  const [snapDiscord, setSnapDiscord] = useState("");
  const [snapEmail, setSnapEmail] = useState("");
  const totalStr = `${total.toFixed(2)}${sym}`;
  const snapTotalStr = `${snapTotal.toFixed(2)}${sym}`;

  const openPayment = (url) => {
    if (!method) return;
    if (!discord.trim()) { setErr(T.checkout.errDiscord[lang]); return; }
    if (!email.trim() || !email.includes("@")) { setErr(T.checkout.errEmail[lang]); return; }
    setChosen(method); setSnapDiscord(discord.trim()); setSnapEmail(email.trim()); setErr("");
    window.open(url, "_blank"); setStep("waiting");
  };
  const onFile = (e) => { const f = e.target.files && e.target.files[0]; if (f) { setProof(f); setProofUrl(URL.createObjectURL(f)); setErr(""); } };
  const confirmProof = async () => {
    if (!proof) { setErr(T.checkout.errProof[lang]); return; }
    setSending(true);
    await sendOrder(snapItems, snapTotal, currency, chosen, snapDiscord, snapEmail, proof);
    clear(); window.location.href = DISCORD;
  };

  if (step === "waiting") {
    const url = chosen === "paypal" ? PAYPAL : DISCORD;
    return (
      <div className="checkout-page"><div className="checkout-box">
        <div className="proof-done-badge"><span className="proof-done-icon">↗</span>{lang === "FR" ? "Paiement ouvert dans un nouvel onglet" : "Payment opened in a new tab"}</div>
        <h2 className="checkout-title" style={{ marginBottom:8 }}>{lang === "FR" ? "As-tu payé ?" : "Have you paid?"}</h2>
        <p className="proof-sub">{lang === "FR" ? `Complète le paiement de ${snapTotalStr} sur l'onglet qui vient de s'ouvrir, puis reviens ici.` : `Complete the ${snapTotalStr} payment in the tab that just opened, then come back here.`}</p>
        <button className="paypal-me-btn" style={{ marginBottom:12 }} onClick={() => setStep("proof")}>{lang === "FR" ? "✓ J'AI PAYÉ — Envoyer ma preuve" : "✓ I HAVE PAID — Upload my proof"}</button>
        <button className="back-btn" style={{ width:"100%", justifyContent:"center", marginTop:0, opacity:.6 }} onClick={() => window.open(url, "_blank")}>{lang === "FR" ? "Rouvrir le paiement" : "Reopen payment"}</button>
      </div></div>
    );
  }

  if (step === "proof") {
    return (
      <div className="checkout-page"><div className="checkout-box">
        <div className="proof-done-badge"><span className="proof-done-icon">✓</span>{T.checkout.proofDone[lang]}</div>
        <h2 className="checkout-title">{T.checkout.proofTitle[lang]}</h2>
        <p className="proof-sub">{T.checkout.proofSub[lang]}</p>
        <div className="proof-summary">
          {snapItems.map(it => <div key={it.id} className="checkout-item"><span>{it.title} × {it.qty}</span><span>{(it.price * it.qty).toFixed(2)}{sym}</span></div>)}
          <div className="checkout-item total-line"><span>{T.cart.total[lang]}</span><span>{snapTotalStr}</span></div>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={onFile} />
        {proofUrl ? (
          <div className="proof-preview-wrap">
            <img className="proof-preview" src={proofUrl} alt="preuve" />
            <button className="proof-change-btn" onClick={() => fileRef.current && fileRef.current.click()}>{T.checkout.proofChange[lang]}</button>
          </div>
        ) : (
          <button className="proof-upload-btn" onClick={() => fileRef.current && fileRef.current.click()}>{T.checkout.proofBtn[lang]}</button>
        )}
        {err && <span className="input-error-msg" style={{ marginBottom:12 }}>{err}</span>}
        <button className="checkout-btn" onClick={confirmProof} disabled={sending}>{sending ? T.checkout.sending[lang] : T.checkout.proofConfirm[lang]}</button>
      </div></div>
    );
  }

  return (
    <div className="checkout-page"><div className="checkout-box">
      <button className="back-btn" onClick={onBack}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>{T.checkout.back[lang]}</button>
      <h2 className="checkout-title">{T.checkout.summary[lang]}</h2>
      <div className="checkout-items">
        {items.map(it => <div key={it.id} className="checkout-item"><span>{it.title} × {it.qty}</span><span>{(it.price * it.qty).toFixed(2)}{sym}</span></div>)}
        <div className="checkout-item total-line"><span>{T.cart.total[lang]}</span><span>{totalStr}</span></div>
      </div>
      <div className="discord-input-wrap">
        <label className="discord-input-label">{IconDiscord}{T.checkout.discordLabel[lang]}</label>
        <input className={`discord-input${err && !discord.trim() ? " input-error" : ""}`} type="text" placeholder={T.checkout.discordPh[lang]} value={discord} onChange={e => { setDiscord(e.target.value); setErr(""); }} />
        {err && <span className="input-error-msg">{err}</span>}
      </div>
      <div className="discord-input-wrap">
        <label className="discord-input-label"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity:.7 }}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>{T.checkout.emailLabel[lang]}</label>
        <input className={`discord-input${err && !email.includes("@") ? " input-error" : ""}`} type="email" placeholder={T.checkout.emailPh[lang]} value={email} onChange={e => { setEmail(e.target.value); setErr(""); }} />
      </div>
      <p className="payment-label">{T.checkout.payMethod[lang]}</p>
      <div className="payment-methods">
        <button className={`method-btn${method === "paypal" ? " selected" : ""}`} onClick={() => setMethod("paypal")}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.93.901C5.006.411 5.43.05 5.93.05h7.298c2.551 0 4.564.676 5.88 1.955 1.24 1.21 1.752 2.857 1.52 4.9-.48 4.162-3.29 6.46-8.13 6.46H9.892l-1.05 6.346a.641.641 0 0 1-.633.54z"/></svg>PayPal
        </button>
        <button className={`method-btn${method === "paysafe" ? " selected" : ""}`} onClick={() => setMethod("paysafe")}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Paysafecard
        </button>
      </div>
      {method === "paypal" && (
        <div className="payment-panel">
          <div className="checkout-notice">
            <div className="notice-line"><span className="notice-flag">🇫🇷</span><span>Je te laisse envoyer <strong>{totalStr}</strong> en amis proche sans note.</span></div>
            <div className="notice-line"><span className="notice-flag">🇬🇧</span><span>Please send <strong>{totalStr}</strong> to close friends without a note.</span></div>
          </div>
          <button className="paypal-me-btn" onClick={() => openPayment(PAYPAL)}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.93.901C5.006.411 5.43.05 5.93.05h7.298c2.551 0 4.564.676 5.88 1.955 1.24 1.21 1.752 2.857 1.52 4.9-.48 4.162-3.29 6.46-8.13 6.46H9.892l-1.05 6.346a.641.641 0 0 1-.633.54z"/></svg>
            {T.checkout.payBtn[lang](totalStr)}
          </button>
        </div>
      )}
      {method === "paysafe" && (
        <div className="payment-panel">
          <div className="checkout-notice">
            <div className="notice-line"><span className="notice-flag">🇫🇷</span><span>Achète une Paysafecard de <strong>{totalStr}</strong> et envoie le code dans ton ticket Discord.</span></div>
            <div className="notice-line"><span className="notice-flag">🇬🇧</span><span>Buy a Paysafecard of <strong>{totalStr}</strong> and send the code in your Discord ticket.</span></div>
          </div>
          <button className="paysafe-btn" onClick={() => openPayment(DISCORD)}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            {T.checkout.ticketBtn[lang]}
          </button>
        </div>
      )}
    </div></div>
  );
}

/* ---------- App ---------- */
function App() {
  const [currency, setCurrency] = useState("EUR");
  const [lang, setLang] = useState("FR");
  const [cartOpen, setCartOpen] = useState(false);
  const [view, setView] = useState("home");
  useReveal([view, currency, lang]);
  useSpotlight();
  useEffect(() => { window.scrollTo(0, 0); }, [view]);
  return (
    <div className="app">
      <ScrollProgress />
      <Navbar onCartOpen={() => setCartOpen(true)} lang={lang} />
      {view === "home" && (
        <Fragment>
          <Hero lang={lang} />
          <Features lang={lang} />
          <Stats />
          <Shop currency={currency} lang={lang} onAdded={() => setCartOpen(true)} />
          <Steps lang={lang} />
          <Footer lang={lang} />
        </Fragment>
      )}
      {view === "checkout" && <Checkout currency={currency} onBack={() => setView("home")} lang={lang} />}
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} onCheckout={() => { setCartOpen(false); setView("checkout"); }} currency={currency} lang={lang} />
      <div className="floating-currency">
        <button className={`currency-btn${currency === "EUR" ? " active" : ""}`} onClick={() => setCurrency("EUR")}>€</button>
        <button className={`currency-btn${currency === "USD" ? " active" : ""}`} onClick={() => setCurrency("USD")}>$</button>
        <div className="toggle-divider" />
        <button className={`currency-btn${lang === "FR" ? " active" : ""}`} onClick={() => setLang("FR")}>FR</button>
        <button className={`currency-btn${lang === "EN" ? " active" : ""}`} onClick={() => setLang("EN")}>EN</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <StrictMode><CartProvider><App /></CartProvider></StrictMode>
);

    </script>
  </body>
</html>
